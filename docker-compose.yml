services:
  bitmagnet:
    container_name: bitmagnet-rss
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./config:/root/.config/bitmagnet
      - ./data/bitmagnet:/root/.local/share/bitmagnet
    restart: unless-stopped
    environment:
      - LOG_FILE_ROTATOR_ENABLED=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=postgres
      - TMDB_API_KEY=${TMDB_API_KEY}
      - RSS_IMPORTER_DOWNLOAD_DELAY=70s
    # --- Without VPN: direct ports ---
    ports:
      - "3333:3333"
      - "3334:3334/tcp"
      - "3334:3334/udp"
    networks:
      - bitmagnet
    depends_on:
      postgres:
        condition: service_healthy
    # --- With VPN via gluetun: comment out the block above and uncomment below ---
    # network_mode: service:gluetun
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    #   gluetun:
    #     condition: service_healthy
    command:
      - worker
      - run
      - --all

  # --- Gluetun VPN (uncomment when using network_mode above) ---
  # gluetun:
  #   container_name: bitmagnet-rss-gluetun
  #   image: qmcgaw/gluetun:latest
  #   cap_add:
  #     - NET_ADMIN
  #   ports:
  #     - "3333:3333"
  #     - "3334:3334/tcp"
  #     - "3334:3334/udp"
  #   environment:
  #     # See https://github.com/qdm12/gluetun-wiki/tree/main/setup/providers
  #     - VPN_SERVICE_PROVIDER=your_vpn_provider
  #   devices:
  #     - /dev/net/tun:/dev/net/tun
  #   restart: always
  #   extra_hosts:
  #     - "postgres:192.168.55.11"
  #   networks:
  #     bitmagnet:
  #       ipv4_address: 192.168.55.10

  postgres:
    image: postgres:16-alpine
    container_name: bitmagnet-rss-postgres
    volumes:
      - /mnt/config/bitmagnet/postgres:/var/lib/postgresql/data
    networks:
      - bitmagnet
    ports:
      - "5432:5432"
    shm_size: 1g
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bitmagnet
      - PGUSER=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      start_period: 20s

